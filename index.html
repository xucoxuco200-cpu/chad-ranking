<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate CHUD Rankings – Urban University</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f9f9f9;
        margin: 0;
        padding: 40px;
        color: #222;
    }

    h1 {
        text-align: center;
        font-size: 36px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    h2 {
        text-align: center;
        font-size: 20px;
        font-weight: normal;
        margin-bottom: 40px;
        color: #555;
    }

    table {
        width: 600px;
        margin: 0 auto;
        border-collapse: collapse;
        background-color: #fff;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    th, td {
        padding: 20px;
        border-bottom: 1px solid #ddd;
        text-align: left;
        font-size: 22px;
    }

    th {
        background-color: #0a3d62;
        color: #fff;
        font-size: 24px;
    }

    tr:hover {
        background-color: #f1f1f1;
    }

    img {
        width: 60px;
        height: 60px;
        vertical-align: middle;
        margin-right: 15px;
        border-radius: 10px;
    }

    td.rank {
        font-weight: bold;
        font-size: 26px;
    }

</style>
</head>
<body>

<h1>Ultimate CHUD Rankings</h1>
<h2>Rated by Urban University – Official Report</h2>

<table>
    <thead>
        <tr>
            <th>Rank</th>
            <th>Name</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td class="rank">1</td>
            <td><img src="image 1.jpg" alt="Dato">👑 Dato</td>
        </tr>
        <tr>
            <td class="rank">2</td>
            <td><img src="image 4.jpg" alt="Kartvela">👑 Kartvela</td>
        </tr>
        <tr>
            <td class="rank">3</td>
            <td><img src="image 2.jpg" alt="Saba">👑 Saba</td>
        </tr>
        <tr>
            <td class="rank">4</td>
            <td><img src="image 3.jpg" alt="Gabo">👑 Gabo</td>
        </tr>
    </tbody>
</table>

</body>
</html>
