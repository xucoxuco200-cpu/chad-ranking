<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate CHUD Rankings – Urban University</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-image: url('image 5.jpg'); /* your background image */
        background-size: cover; /* stretch to cover screen */
        background-position: center;
        background-repeat: no-repeat;
        margin: 0;
        padding: 60px;
        color: #fff;
        text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
    }

    h1 {
        text-align: center;
        font-size: 50px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    h2 {
        text-align: center;
        font-size: 28px;
        font-weight: normal;
        margin-bottom: 50px;
        color: #f0f0f0;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
    }

    table {
        width: 80%;
        margin: 0 auto;
        border-collapse: collapse;
        background-color: rgba(0,0,0,0.6);
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
        border-radius: 15px;
        overflow: hidden;
    }

    th, td {
        padding: 30px;
        text-align: left;
        font-size: 30px;
        color: #fff;
    }

    th {
        background-color: rgba(10,61,98,0.9);
        font-size: 34px;
    }

    tr:nth-child(even) {
        background-color: rgba(255,255,255,0.1);
    }

    tr:hover {
        background-color: rgba(255,255,255,0.2);
    }

    img {
        width: 100px;
        height: 100px;
        vertical-align: middle;
        margin-right: 20px;
        border-radius: 15px;
        border: 3px solid #fff;
    }

    td.rank {
        font-weight: bold;
        font-size: 36px;
    }
</style>
</head>
<body>

<h1>Ultimate CHUD Rankings</h1>
<h2>Rated by Urban University – Official Report</h2>

<table>
    <thead>
        <tr>
            <th>Rank</th>
            <th>Name</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td class="rank">1</td>
            <td><img src="image 1.jpg" alt="Dato">👑 Dato</td>
        </tr>
        <tr>
            <td class="rank">2</td>
            <td><img src="image 4.jpg" alt="Kartvela">👑 Kartvela</td>
        </tr>
        <tr>
            <td class="rank">3</td>
            <td><img src="image 2.jpg" alt="Saba">👑 Saba</td>
        </tr>
        <tr>
            <td class="rank">4</td>
            <td><img src="image 3.jpg" alt="Gabo">👑 Gabo</td>
        </tr>
    </tbody>
</table>

</body>
</html>
