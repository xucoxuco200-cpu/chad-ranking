<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate CHUD Rankings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .ranking-table {
            max-width: 400px;
            margin: 0 auto;
            border-collapse: collapse;
            width: 100%;
        }

        .ranking-table th, .ranking-table td {
            border: 1px solid #ccc;
            padding: 12px 15px;
            text-align: left;
        }

        .ranking-table th {
            background-color: #333;
            color: #fff;
        }

        .ranking-table tr:nth-child(even) {
            background-color: #eaeaea;
        }
    </style>
</head>
<body>
    <h1>Ultimate CHUD Rankings – Rated by Urban University</h1>

    <table class="ranking-table">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>👑 Dato</td>
            </tr>
            <tr>
                <td>2</td>
                <td>👑 Kartvela</td>
            </tr>
            <tr>
                <td>3</td>
                <td>👑 Saba</td>
            </tr>
            <tr>
                <td>4</td>
                <td>👑 Gabo</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
