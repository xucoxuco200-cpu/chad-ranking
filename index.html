<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Chud Rankings</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;

  background-image: url("image%205.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

h1 {
  margin-top: 20px;
  font-size: 40px;
}

.subtitle {
  font-size: 16px;
  margin-bottom: 30px;
}

/* Card */
.card {
  background: rgba(0,0,0,0.7);
  margin: 15px auto;
  padding: 15px;
  width: 350px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  gap: 15px;
}

/* Images */
.card img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid white;
}

/* Text */
.card h3 {
  margin: 0;
  font-size: 18px;
}

/* Buttons */
button {
  margin-left: auto;
  padding: 5px 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Ultimate Chud Rankings</h1>
<div class="subtitle">rated by urban university</div>

<div id="list"></div>

<script>
let people = [
  { name: "Dato LTN Shonia", img: "image 1.jpg" },
  { name: "Kartvela", img: "image 4.jpg" },
  { name: "Saba Btn xucishvili", img: "image 2.jpg" },
  { name: "Gabriel Tona mazana", img: "image 3.jpg" }
];

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  people.forEach((person, i) => {
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${person.img}">
      <h3>👑 ${person.name}</h3>
      <button onclick="moveUp(${i})">⬆</button>
      <button onclick="moveDown(${i})">⬇</button>
    `;

    list.appendChild(div);
  });
}

function moveUp(i) {
  if (i === 0) return;
  [people[i], people[i-1]] = [people[i-1], people[i]];
  render();
}

function moveDown(i) {
  if (i === people.length - 1) return;
  [people[i], people[i+1]] = [people[i+1], people[i]];
  render();
}

render();
</script>

</body>
</html>
