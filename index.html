<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🔥 Ultimate Chud Ranking 🔥</title>
  <style>
    /* Body & background */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      text-align: center;
      background: url('image5.jpg') center/cover no-repeat;
      color: white;
    }

    h1 {
      font-size: 50px;
      margin: 20px 0;
      text-shadow: 2px 2px #000;
    }

    /* Card styles */
    .card {
      background: linear-gradient(135deg, #ffcc00, #ff9900);
      margin: 20px auto;
      padding: 20px;
      width: 350px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
      transition: transform 0.3s, background 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #ffeb3b, #ff6f00);
    }

    h3 {
      font-size: 24px;
      margin: 10px 0;
    }

    /* Buttons */
    button {
      margin: 5px;
      padding: 10px 20px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background-color: #fff;
      color: #ff4e50;
      font-weight: bold;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background-color: #ff4e50;
      color: #fff;
    }

  </style>
</head>
<body>
  <h1>🔥 Ultimate Chad Ranking 🔥</h1>
  <div id="list"></div>

  <script>
    // Friends list with optional emojis for ranks
    let people = [
      "Dato LTN Shonia",
      "Gabriel AKA tona",
      "kartvela",
      "saba Btn xucishvili"
    ];

    const rankEmojis = ["👑", "🥈", "🥉", "🔥"];

    const list = document.getElementById("list");

    function render() {
      list.innerHTML = "";
      people.forEach((name, i) => {
        let div = document.createElement("div");
        div.className = "card";

        // Get emoji for rank
        let emoji = rankEmojis[i] || "💪";

        div.innerHTML = `
          <h3>#${i+1} ${emoji} ${name}</h3>
          <button onclick="moveUp(${i})">⬆</button>
          <button onclick="moveDown(${i})">⬇</button>
        `;
        list.appendChild(div);
      });
    }

    function moveUp(i) {
      if (i === 0) return;
      [people[i], people[i-1]] = [people[i-1], people[i]];
      render();
    }

    function moveDown(i) {
      if (i === people.length - 1) return;
      [people[i], people[i+1]] = [people[i+1], people[i]];
      render();
    }

    render();
  </script>
</body>
</html>
