<!DOCTYPE html>
<html>
<head>
  <title>Chad Ranking</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }
    h1 {
      margin-top: 20px;
    }
    .card {
      background: #222;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      border-radius: 10px;
    }
    button {
      margin: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🔥 Chad Ranking 🔥</h1>

<div id="list"></div>

<script>
let people = [
  "dato ltn shonia",
  "gabriel tona",
  "saba btn xuco",
  "kartvela"
];

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  people.forEach((name, i) => {
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>#${i+1} ${name}</h3>
      <button onclick="moveUp(${i})">⬆</button>
      <button onclick="moveDown(${i})">⬇</button>
    `;

    list.appendChild(div);
  });
}

function moveUp(i) {
  if (i === 0) return;
  [people[i], people[i-1]] = [people[i-1], people[i]];
  render();
}

function moveDown(i) {
  if (i === people.length - 1) return;
  [people[i], people[i+1]] = [people[i+1], people[i]];
  render();
}

render();
</script>

</body>
</html>
