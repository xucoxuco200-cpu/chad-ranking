<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate CHUD Rankings – Urban University</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-image: url('image 5.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        margin: 0;
        padding: 60px;
        color: #fff;
        text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
    }

    h1 {
        text-align: center;
        font-size: 50px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    h2 {
        text-align: center;
        font-size: 28px;
        font-weight: normal;
        margin-bottom: 50px;
        color: #f0f0f0;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
    }

    table {
        width: 80%;
        margin: 0 auto;
        border-collapse: collapse;
        background-color: rgba(0,0,0,0.6);
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
        border-radius: 15px;
        overflow: hidden;
    }

    th, td {
        padding: 30px;
        text-align: left;
        font-size: 30px;
        color: #fff;
    }

    th {
        background-color: rgba(10,61,98,0.9);
        font-size: 34px;
    }

    tr:nth-child(even) {
        background-color: rgba(255,255,255,0.1);
    }

    tr:hover {
        background-color: rgba(255,255,255,0.2);
    }

    img {
        width: 100px;
        height: 100px;
        vertical-align: middle;
        margin-right: 20px;
        border-radius: 15px;
        border: 3px solid #fff;
        animation: glow 2s infinite alternate;
    }

    td.rank {
        font-weight: bold;
        font-size: 36px;
    }

    .bio {
        font-size: 18px;
        color: #f0f0f0;
        margin-top: 5px;
        font-style: italic;
    }

    /* Fire Animation */
    .crown-wrapper {
        position: relative;
        display: inline-block;
        margin-left: 5px;
    }

    .fire {
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 20px;
        height: 40px;
        background: linear-gradient(to top, orange, yellow, transparent);
        border-radius: 50%;
        filter: blur(3px);
        animation: flicker 0.3s infinite alternate;
        pointer-events: none;
    }

    @keyframes flicker {
        0% { transform: translateX(-50%) scaleY(1) scaleX(1); opacity: 1; }
        50% { transform: translateX(-50%) scaleY(1.2) scaleX(0.9); opacity: 0.8; }
        100% { transform: translateX(-50%) scaleY(0.8) scaleX(1.1); opacity: 1; }
    }

    /* Name fade color animation */
    .name-animated {
        display: inline-block;
        animation: colorFade 3s infinite alternate;
    }

    @keyframes colorFade {
        0% { color: #ff0000; text-shadow: 0 0 5px #ff0000; }
        25% { color: #ff7f00; text-shadow: 0 0 10px #ff7f00; }
        50% { color: #ffff00; text-shadow: 0 0 15px #ffff00; }
        75% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        100% { color: #00ffff; text-shadow: 0 0 5px #00ffff; }
    }

    /* Image glow animation */
    @keyframes glow {
        0% { box-shadow: 0 0 10px #fff; transform: scale(1); }
        25% { box-shadow: 0 0 20px #ff0; transform: scale(1.05); }
        50% { box-shadow: 0 0 30px #f0f; transform: scale(1); }
        75% { box-shadow: 0 0 20px #0ff; transform: scale(1.05); }
        100% { box-shadow: 0 0 10px #fff; transform: scale(1); }
    }

    /* Rank colors for top 3 */
    tbody tr:nth-child(1) td.rank { color: gold; }
    tbody tr:nth-child(2) td.rank { color: silver; }
    tbody tr:nth-child(3) td.rank { color: #cd7f32; } /* bronze */
    tbody tr:nth-child(4) td.rank { color: #fff; } /* normal */
</style>
</head>
<body>

<h1>Ultimate CHUD Rankings</h1>
<h2>Rated by Urban University – Official Report</h2>

<table>
    <thead>
        <tr>
            <th>Rank</th>
            <th>Name</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td class="rank">1</td>
            <td>
                <img src="image 1.jpg" alt="DATO">
                <span class="crown-wrapper">👑<span class="fire"></span></span>
                <span class="name-animated">DATO LTN SHONIA</span>
                <div class="bio"> rapes kids at garden👀👀👀</div>
            </td>
        </tr>
        <tr>
            <td class="rank">2</td>
            <td>
                <img src="image 4.jpg" alt="Kartvela">
                <span class="crown-wrapper">👑<span class="fire"></span></span>
                <span class="name-animated">Kartvela</span>
                <div class="bio"></div>
            </td>
        </tr>
        <tr>
            <td class="rank">3</td>
            <td>
                <img src="image 2.jpg" alt="Saba BTN Xucishvili">
                <span class="crown-wrapper">👑<span class="fire"></span></span>
                <span class="name-animated">Saba BTN Xucishvili</span>
                <div class="bio">Master of Regression</div>
            </td>
        </tr>
        <tr>
            <td class="rank">4</td>
            <td>
                <img src="image 3.jpg" alt="GABRIEL TONA">
                <span class="crown-wrapper">👑<span class="fire"></span></span>
                <span class="name-animated">GABRIEL TONA</span>
                <div class="bio"></div>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
